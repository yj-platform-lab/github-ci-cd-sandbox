name: "Infra Deploy"

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # AWS認証（OIDCで一時クレデンシャル取得）
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::287858436768:role/github-actions-terraform-role
          aws-region: ap-northeast-1
      
      # Terraform apply
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      # backend.hclはpublic repositoryに配置せず、GitHub Actions実行時に生成する
      - name: Create backend.hcl
        working-directory: infra
        run: |
          cat <<EOF > backend.hcl
          bucket       = "${{ vars.TFSTATE_BUCKET }}"
          key          = "dev/terraform.tfstate"
          region       = "ap-northeast-1"
          encrypt      = true
          use_lockfile = true
          EOF
      
      - name: Terraform init
        run: terraform init -backend-config=backend.hcl
        working-directory: infra

      - name: Terraform apply
        run: terraform apply -auto-approve
        working-directory: infra

      - name: Get bucket name
        id: tf-output
        run: |
          BUCKET=$(terraform output -raw bucket_name)
          echo "bucket_name=$BUCKET" >> $GITHUB_OUTPUT
        working-directory: infra

      # index.htmlアップロード（ここ）
      - name: Upload to S3
        run: |
          aws s3 cp index.html s3://${{ steps.tf-output.outputs.bucket_name }}/index.html